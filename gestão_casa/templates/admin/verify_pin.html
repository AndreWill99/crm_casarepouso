<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIN de Segurança - CRM Casa de Repouso</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-sidebar">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Aconchego Santa Barbara"
                class="auth-sidebar-logo">
            <h2>Gestão de Propriedades</h2>

            <ul class="auth-features">
                <li>Controle financeiro completo</li>
                <li>Gestão de funcionários</li>
                <li>Relatórios em tempo real</li>
                <li>Dashboard interativo</li>
            </ul>
        </div>

        <div class="auth-main">
            <div class="auth-form-container">
                <div class="auth-subtitle">Etapa 2 de 3</div>
                <h1 class="auth-title">PIN da Equipe</h1>
                <p class="auth-desc">Insira o PIN geral de segurança da equipe administrativa.</p>

                {% if error %}
                <div
                    style="color:#D35400; background:#fdede4; padding:10px 15px; border-radius:8px; margin-bottom:20px; font-weight:600; text-align:center; display:flex; align-items:center; justify-content:center; gap:8px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                    {{ error }}
                </div>
                {% endif %}

                <form action="/auth/verify-pin" method="POST">
                    <div class="auth-form-group">
                        <label class="auth-label">PIN Geral</label>
                        <div class="auth-input-wrapper">
                            <input type="password" name="pin" class="auth-input" placeholder="••••" required maxlength="10">
                            <span class="auth-input-icon" style="cursor: pointer;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path
                                        d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                                    </path>
                                    <line x1="1" y1="1" x2="23" y2="23"></line>
                                </svg>
                            </span>
                        </div>
                    </div>

                    <button type="submit" class="btn-auth">
                        Avançar
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </button>
                    
                    <div class="auth-footer" style="margin-top:20px;">
                        <a href="/auth/login">Voltar ao Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
        document.querySelectorAll('.auth-input-icon').forEach(icon => {
            if (icon.style.cursor === 'pointer') {
                icon.addEventListener('click', function () {
                    const input = this.previousElementSibling;
                    const svg = this.querySelector('svg');
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.style.color = '#7A1515';
                        svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
                    } else {
                        input.type = 'password';
                        icon.style.color = '#999';
                        svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
                    }
                });
            }
        });
    </script>
</body>

</html>
