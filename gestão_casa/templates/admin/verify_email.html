<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmação de E-mail - CRM Casa de Repouso</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-sidebar">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Aconchego Santa Barbara"
                class="auth-sidebar-logo">
            <h2>Gestão de Propriedades</h2>

            <ul class="auth-features">
                <li>Controle financeiro completo</li>
                <li>Gestão de funcionários</li>
                <li>Relatórios em tempo real</li>
                <li>Dashboard interativo</li>
            </ul>
        </div>

        <div class="auth-main">
            <div class="auth-form-container">
                <div class="auth-subtitle">Etapa 3 de 3</div>
                <h1 class="auth-title">Confirme seu E-mail</h1>
                <p class="auth-desc">Insira o código de 6 dígitos que enviamos para o seu e-mail.</p>

                {% if error %}
                <div
                    style="color:#D35400; background:#fdede4; padding:10px 15px; border-radius:8px; margin-bottom:20px; font-weight:600; text-align:center; display:flex; align-items:center; justify-content:center; gap:8px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                    {{ error }}
                </div>
                {% endif %}

                <form action="/auth/verify-email" method="POST">
                    <div class="auth-form-group">
                        <label class="auth-label">Código de Verificação</label>
                        <div class="auth-input-wrapper">
                            <input type="text" name="otp" class="auth-input" placeholder="000000" required maxlength="6" style="letter-spacing: 5px; text-align: center; font-size: 1.2rem; font-weight: bold;">
                        </div>
                    </div>

                    <button type="submit" class="btn-auth">
                        Acessar Sistema
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </button>
                    
                    <div class="auth-footer" style="margin-top:20px;">
                        <a href="/auth/login">Cancelar e Voltar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
