<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestão - CRM Casa de Repouso{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_head %}{% endblock %}
</head>

<body>
    <header class="admin-topbar">
        <div class="admin-topbar-left">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Aconchego Santa Barbara">
        </div>

        <div class="admin-topbar-center"
            style="flex: 1; display: flex; align-items: center; justify-content: flex-end; padding: 0 40px; gap: 20px;">
            {% block topbar_actions %}{% endblock %}
        </div>

        <div class="admin-topbar-right">
            <span>Administrador</span>
        </div>
    </header>

    <div class="admin-layout" id="admin-layout">
        <!-- Sidebar Reutilizável -->
        <aside class="admin-sidebar" id="sidebar">
            <div class="admin-sidebar-header">
                <span class="admin-sidebar-collapse"
                    onclick="document.getElementById('sidebar').classList.toggle('minimized'); document.getElementById('content-wrapper').classList.toggle('sidebar-minimized');">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </span>
            </div>

            {% set current_endpoint = request.endpoint %}

            <nav class="admin-sidebar-nav">
                <a href="{{ url_for('admin.dashboard') if 'admin.dashboard' in config else '/admin' }}"
                    class="{% if current_endpoint == 'admin.dashboard' %}active{% endif %}">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span class="nav-text">Dashboard</span>
                </a>
                <a href="{{ url_for('admin.residentes') if 'admin.residentes' in config else '/admin/residentes' }}"
                    class="{% if current_endpoint == 'admin.residentes' %}active{% endif %}">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    <span class="nav-text">Residentes</span>
                </a>
                <a href="{{ url_for('admin.funcionarios') if 'admin.funcionarios' in config else '/admin/funcionarios' }}"
                    class="{% if current_endpoint == 'admin.funcionarios' %}active{% endif %}">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    <span class="nav-text">Equipe</span>
                </a>
                <a href="{{ url_for('admin.financeiro') if 'admin.financeiro' in config else '/admin/financeiro' }}"
                    class="{% if current_endpoint == 'admin.financeiro' %}active{% endif %}">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="1" x2="12" y2="23"></line>
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                    </svg>
                    <span class="nav-text">Financeiro</span>
                </a>
                <a href="{{ url_for('admin.leads') if 'admin.leads' in config else '/admin/leads' }}"
                    class="{% if current_endpoint == 'admin.leads' %}active{% endif %}">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="8.5" cy="7" r="4"></circle>
                        <polyline points="17 11 19 13 23 9"></polyline>
                    </svg>
                    <span class="nav-text">Gestão de leads</span>
                </a>
                <a href="{{ url_for('admin.agenda') if 'admin.agenda' in config else '/admin/agenda' }}"
                    class="{% if current_endpoint == 'admin.agenda' %}active{% endif %}">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <span class="nav-text">Agenda</span>
                </a>
            </nav>

            <div class="admin-sidebar-footer">
                <a href="{{ url_for('admin.configuracoes') if 'admin.configuracoes' in config else '/admin/configuracoes' }}"
                    class="sidebar-footer-link {% if current_endpoint == 'admin.configuracoes' %}active{% endif %}">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                        </path>
                    </svg>
                    <span class="nav-text">Configuração</span>
                </a>
            </div>
        </aside>

        <!-- Main Content Wrapper -->
        <div class="admin-content-wrapper" id="content-wrapper">
            <main class="admin-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>

</html>
