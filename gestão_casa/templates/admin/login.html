<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CRM Casa de Repouso</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-sidebar">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Aconchego Santa Barbara"
                class="auth-sidebar-logo">
            <h2>Gestão de Propriedades</h2>

            <ul class="auth-features">
                <li>Controle financeiro completo</li>
                <li>Gestão de funcionários</li>
                <li>Relatórios em tempo real</li>
                <li>Dashboard interativo</li>
            </ul>
        </div>

        <div class="auth-main">
            <div class="auth-form-container">
                <div class="auth-subtitle">Bem-vindo de volta</div>
                <h1 class="auth-title">Entrar na<br>sua conta</h1>
                <p class="auth-desc">Insira suas credenciais para acessar o sistema.</p>

                <form action="/auth/login" method="POST">
                    <div class="auth-form-group">
                        <label class="auth-label">Nome de Usuário</label>
                        <div class="auth-input-wrapper">
                            <input type="text" name="username" class="auth-input" placeholder="ex: joao.silva" required>
                            <span class="auth-input-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="12" cy="7" r="4"></circle>
                                </svg>
                            </span>
                        </div>
                    </div>

                    <div class="auth-form-group">
                        <label class="auth-label">Senha</label>
                        <div class="auth-input-wrapper">
                            <input type="password" name="password" class="auth-input" placeholder="••••••••" required>
                            <span class="auth-input-icon" style="cursor: pointer;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path
                                        d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                                    </path>
                                    <line x1="1" y1="1" x2="23" y2="23"></line>
                                </svg>
                            </span>
                        </div>
                    </div>

                    <a href="/auth/recover-password" class="forgot-password">Esqueci minha senha</a>

                    <button type="submit" class="btn-auth" href="/admin/dashboard">
                        Entrar
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </button>

                    <div class="auth-footer">
                        Não tem uma conta? <a href="/auth/register">Cadastre-se</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
        // Funcionalidade de mostrar/ocultar senha
        document.querySelectorAll('.auth-input-icon').forEach(icon => {
            if (icon.style.cursor === 'pointer') {
                icon.addEventListener('click', function () {
                    const input = this.previousElementSibling;
                    const svg = this.querySelector('svg');
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.style.color = '#7A1515'; // Change color when visible
                        svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
                    } else {
                        input.type = 'password';
                        icon.style.color = '#999'; // Revert back
                        svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
                    }
                });
            }
        });
    </script>
</body>

</html>
